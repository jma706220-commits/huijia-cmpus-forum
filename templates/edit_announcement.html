{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-edit"></i> 编辑公告</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">公告标题</label>
                        <input type="text" name="title" class="form-control" value="{{ announcement.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">公告内容</label>
                        <textarea name="content" rows="8" class="form-control" required>{{ announcement.content }}</textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_pinned" class="form-check-input" id="is_pinned" {% if announcement.is_pinned %}checked{% endif %}>
                        <label class="form-check-label" for="is_pinned">
                            <i class="fas fa-thumbtack"></i> 置顶此公告
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                    <a href="/admin/announcements" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
