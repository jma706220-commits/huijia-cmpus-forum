{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-plus-circle"></i> 发布公告</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">公告标题</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">公告内容</label>
                        <textarea name="content" rows="8" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" name="is_pinned" class="form-check-input" id="is_pinned">
                        <label class="form-check-label" for="is_pinned">
                            <i class="fas fa-thumbtack"></i> 置顶此公告（将显示在最前面）
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">发布公告</button>
                    <a href="/admin/announcements" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
