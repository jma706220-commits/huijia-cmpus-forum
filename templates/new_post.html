{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-pen-alt"></i> 发布新帖子</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">选择版块</label>
                        <select name="section" class="form-select" required>
                            <option value="">请选择...</option>
                            {% for key, name in sections.items() %}
                                <option value="{{ key }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">标题</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">内容</label>
                        <textarea name="content" rows="10" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">附件（可多选）</label>
                        <input type="file" name="attachments" multiple class="form-control" accept="image/*,.pdf,.txt,.zip,.rar,.doc,.docx,.xls,.xlsx">
                        <small class="text-muted">
                            支持图片（jpg, png, gif, webp）、文档（pdf, txt, doc, docx, xls, xlsx）、压缩包（zip, rar）等，单个文件最大10MB
                        </small>
                    </div>
                    <button type="submit" class="btn btn-primary">发布</button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
